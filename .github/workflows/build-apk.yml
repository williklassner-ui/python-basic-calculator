name: Build Android APK

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-pip zip unzip openjdk-17-jdk
          pip install buildozer cython

      - name: Build APK
        run: |
          buildozer init || true
          echo "title = K-Rechner" > buildozer.spec
          buildozer -v android debug || echo "Build failed - check logs"

      - name: Upload any APK
        uses: actions/upload-artifact@v4
        with:
          name: K-Rechner-APK
          path: bin/*.apk
