name: Build Android APK

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install Buildozer dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y python3-pip zip unzip openjdk-17-jdk
        python -m pip install --upgrade pip
        pip install buildozer cython

    - name: Prepare Buildozer
      run: |
        buildozer init || true
        cat > buildozer.spec << EOF
[app]
# (minimal config for calculator)
title = K-Rechner
package.name = krechner
package.domain = org.krechner
source.dir = .
source.include_exts = py,png,jpg,kv
version = 1.0.0
requirements = python3,kivy
orientation = portrait

[buildozer]
log_level = 2
EOF

    - name: Build APK
      run: buildozer -v android debug

    - name: Rename with version
      run: |
        VERSION=${GITHUB_REF#refs/tags/}
        mv bin/*.apk bin/K-Rechner-${VERSION:-latest}.apk || echo "APK not found"

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: K-Rechner-APK
        path: bin/*.apk
        retention-days: 30
